name: Build BL Watchlist

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./app
        run: npm install

      - name: Build project
        working-directory: ./app
        run: npx vite build

      - name: Upload dist folder
        uses: actions/upload-artifact@v4
        with:
          name: dist-v1.3.8
          path: ./app/dist/
          
